<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI | Secure Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #cf5c36; /* Terracotta */
            --primary-dark: #b34a29;
            --accent: #9d4d3f; /* Burnt Orange */
            --bg: #f5f2eb; /* Warm Cream */
            --card-bg: rgba(255, 255, 255, 0.65);
            --border: rgba(207, 92, 54, 0.15);
            --text: #2c2420; /* Deep Charcoal/Brown */
            --text-muted: #7a6e67;
            --success: #6b8e23;
            --error: #a33b20;
            --sidebar-width: 340px;
            --glass-blur: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(207, 92, 54, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(157, 77, 63, 0.05) 0%, transparent 40%),
                url("https://www.transparenttextures.com/patterns/cream-paper.png");
        }

        h1, h2, h3, h4 {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-weight: 700;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-fade { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide { animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Auth Screen */
        #auth {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px -15px rgba(44, 36, 32, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .auth-header h1 {
            font-size: 2.8rem;
            color: var(--primary);
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, textarea {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(207, 92, 54, 0.08);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.75rem;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            font-size: 1rem;
            gap: 0.6rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            box-shadow: 0 4px 12px rgba(207, 92, 54, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(207, 92, 54, 0.3);
        }

        .btn-secondary {
            background: rgba(44, 36, 32, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(44, 36, 32, 0.08);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--error);
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: #8e2f18;
            transform: translateY(-1px);
        }

        .auth-footer {
            margin-top: 2.5rem;
            display: flex;
            gap: 1.25rem;
        }

        /* App Layout */
        #app {
            display: none;
            gap: 2.5rem;
            flex: 1;
            overflow: hidden;
            padding-bottom: 2rem;
        }

        .sidebar {
            width: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 15px 45px -10px rgba(44, 36, 32, 0.08);
        }

        .sidebar-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 10px 30px -5px rgba(44, 36, 32, 0.05);
        }

        .sidebar-card h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--primary);
        }

        .list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border);
            padding: 0.85rem 1.1rem;
            border-radius: 14px;
            font-size: 0.9rem;
            word-break: break-all;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: transform 0.2s ease;
        }

        .list-item:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.6);
        }

        /* Chat Area */
        .chat-header {
            padding: 2rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
        }

        .user-info h3 {
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
            color: var(--text);
        }

        .user-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 1.25rem 1.5rem;
            border-radius: 20px;
            line-height: 1.7;
            font-size: 1rem;
            position: relative;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(44, 36, 32, 0.03);
        }

        .message-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .message code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(44, 36, 32, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .chat-input-area {
            padding: 2.5rem;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.2);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        textarea {
            resize: none;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            min-height: 1.5rem;
        }

        .status-text {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: grid;
            gap: 2rem;
            padding: 1rem 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
        }

        .stat-card h4 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            font-family: Georgia, serif;
        }

        .admin-table-container {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 1rem 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-family: Georgia, serif;
            color: var(--primary);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.2);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .admin-section-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 0 1rem;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .admin-settings {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(207, 92, 54, 0.1);
            border-radius: 10px;
            border: 3px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(207, 92, 54, 0.2);
            border: 3px solid transparent;
            background-clip: content-box;
        }

        @media (max-width: 1024px) {
            .container { padding: 1.5rem; }
            #app { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; }
            .main-content { min-height: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth View -->
        <section id="auth" class="animate-fade">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Local AI</h1>
                    <p>Private, Secure, Locally Hosted</p>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input id="username" type="text" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="password" type="password" placeholder="••••••••">
                </div>
                <div id="authStatus" class="status-bar" style="margin-bottom: 1rem;">
                    <span class="status-text"></span>
                </div>
                <div class="auth-footer">
                    <button id="loginBtn" class="btn btn-primary">Login</button>
                    <button id="signupBtn" class="btn btn-secondary">Sign Up</button>
                </div>
            </div>
        </section>

        <!-- Main App View -->
        <section id="app">
            <aside class="sidebar animate-slide">
                <div class="sidebar-card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Documents
                    </h2>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <input id="fileInput" type="file" accept=".pdf,.txt" style="display: none;">
                        <button onclick="document.getElementById('fileInput').click()" class="btn btn-secondary" style="width: 100%; margin-bottom: 0.5rem;">
                            Choose File
                        </button>
                        <button id="uploadBtn" class="btn btn-primary">
                            Upload Document
                        </button>
                    </div>
                    <ul id="documents" class="list"></ul>
                </div>

                <div id="adminWrap" class="sidebar-card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Admin Dashboard
                    </h2>
                    
                    <div class="admin-dashboard">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h4>Users</h4>
                                <div id="statUsers" class="value">0</div>
                            </div>
                            <div class="stat-card">
                                <h4>Files</h4>
                                <div id="statDocs" class="value">0</div>
                            </div>
                        </div>

                        <span class="admin-section-title">User Registry</span>
                        <ul id="adminUsers" class="list"></ul>

                        <span class="admin-section-title">Global Documents</span>
                        <div class="admin-table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>User</th>
                                        <th>File</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="adminDocuments"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="admin-settings">
                        <span class="admin-section-title">Vault Credentials</span>
                        <div class="form-group">
                            <input id="newAdminUser" type="text" placeholder="New Admin Username">
                        </div>
                        <div class="form-group">
                            <input id="newAdminPass" type="password" placeholder="New Admin Password">
                        </div>
                        <button id="updateAdminBtn" class="btn btn-secondary" style="width: 100%;">Update Credentials</button>
                    </div>
                </div>
            </aside>

            <main class="main-content animate-fade">
                <header class="chat-header">
                    <div class="user-info">
                        <h3 id="who">Guest</h3>
                        <p id="role">Not Logged In</p>
                    </div>
                    <button id="logoutBtn" class="btn btn-secondary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        Logout
                    </button>
                </header>

                <div id="messages"></div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea id="prompt" rows="3" placeholder="Type a message or mention a document..."></textarea>
                        <div class="status-bar">
                            <span id="appStatus" class="status-text"></span>
                            <button id="sendBtn" class="btn btn-primary" style="width: auto; padding: 0.75rem 2rem;">
                                Send
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </section>
    </div>

    <script>
        const auth = document.getElementById("auth");
        const app = document.getElementById("app");
        const authStatus = document.getElementById("authStatus").querySelector(".status-text");
        const appStatus = document.getElementById("appStatus");
        const messages = document.getElementById("messages");
        const documents = document.getElementById("documents");
        const adminWrap = document.getElementById("adminWrap");
        const adminDocuments = document.getElementById("adminDocuments");
        const adminUsers = document.getElementById("adminUsers");
        const who = document.getElementById("who");
        const role = document.getElementById("role");

        const statUsers = document.getElementById("statUsers");
        const statDocs = document.getElementById("statDocs");

        const api = async (path, options = {}) => {
            const response = await fetch(path, {
                credentials: "same-origin",
                headers: { "Content-Type": "application/json", ...(options.headers || {}) },
                ...options
            });
            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || "Request failed");
            }
            return data;
        };

        const setStatus = (node, text, type = "") => {
            node.textContent = text || "";
            node.className = "status-text " + type;
        };

        const renderList = (node, rows) => {
            node.innerHTML = "";
            if (!rows.length) {
                const li = document.createElement("li");
                li.className = "list-item";
                li.style.color = "var(--text-muted)";
                li.textContent = "No items found.";
                node.appendChild(li);
                return;
            }
            rows.forEach(text => {
                const li = document.createElement("li");
                li.className = "list-item animate-fade";
                li.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
                    ${text}
                `;
                node.appendChild(li);
            });
        };

        const renderMessages = rows => {
            messages.innerHTML = "";
            rows.forEach(row => {
                const div = document.createElement("div");
                div.className = `message message-${row.role === "assistant" ? "assistant" : "user"}`;
                div.textContent = row.message;
                messages.appendChild(div);
            });
            messages.scrollTop = messages.scrollHeight;
        };

        const renderAdminDocs = rows => {
            adminDocuments.innerHTML = "";
            if (!rows.length) {
                adminDocuments.innerHTML = "<tr><td colspan='3' style='text-align:center'>No documents.</td></tr>";
                return;
            }
            rows.forEach(doc => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${doc.username}</td>
                    <td>${doc.filename}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteDoc(${doc.id})">Delete</button></td>
                `;
                adminDocuments.appendChild(tr);
            });
        };

        const renderAdminUsers = rows => {
            adminUsers.innerHTML = "";
            rows.forEach(u => {
                const li = document.createElement("li");
                li.className = "list-item animate-fade";
                li.innerHTML = `
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <strong>${u.username}</strong> (${u.role})
                `;
                adminUsers.appendChild(li);
            });
        };

        const deleteDoc = async (id) => {
            if (!confirm("Are you sure you want to delete this document permanently?")) return;
            try {
                const state = await api("/api/admin/delete-document", {
                    method: "POST",
                    body: JSON.stringify({ id: String(id) })
                });
                renderState(state);
            } catch (error) {
                alert(error.message);
            }
        };

        window.deleteDoc = deleteDoc;

        const renderState = state => {
            if (!state.authenticated) {
                auth.style.display = "flex";
                app.style.display = "none";
                return;
            }

            auth.style.display = "none";
            app.style.display = "flex";
            who.textContent = state.username;
            role.textContent = state.role;
            renderMessages(state.messages || []);
            renderList(documents, (state.documents || []).map(doc => doc.filename));
            
            if (state.role === "admin") {
                adminWrap.style.display = "block";
                renderAdminDocs(state.adminDocuments || []);
                renderAdminUsers(state.adminUsers || []);
                statUsers.textContent = state.adminStats.totalUsers;
                statDocs.textContent = state.adminStats.totalDocuments;
            } else {
                adminWrap.style.display = "none";
            }
        };

        const refresh = async () => {
            const state = await api("/api/state", { method: "GET" });
            renderState(state);
        };

        const authAction = async path => {
            try {
                setStatus(authStatus, "Authenticating...");
                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value.trim();
                const state = await api(path, {
                    method: "POST",
                    body: JSON.stringify({ username, password })
                });
                renderState(state);
                setStatus(authStatus, "");
            } catch (error) {
                setStatus(authStatus, error.message, "error");
            }
        };

        document.getElementById("loginBtn").addEventListener("click", () => authAction("/api/login"));
        document.getElementById("signupBtn").addEventListener("click", () => authAction("/api/signup"));

        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await api("/api/logout", { method: "POST", body: "{}" });
            setStatus(appStatus, "");
            renderState({ authenticated: false });
        });

        document.getElementById("sendBtn").addEventListener("click", async () => {
            const prompt = document.getElementById("prompt");
            const message = prompt.value.trim();
            if (!message) return;

            try {
                setStatus(appStatus, "Ollama is thinking...", "success");
                const state = await api("/api/chat", {
                    method: "POST",
                    body: JSON.stringify({ message })
                });
                prompt.value = "";
                renderState(state);
                setStatus(appStatus, "Reply received", "success");
                setTimeout(() => setStatus(appStatus, ""), 3000);
            } catch (error) {
                setStatus(appStatus, error.message, "error");
            }
        });

        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const input = document.getElementById("fileInput");
            const file = input.files[0];
            if (!file) {
                setStatus(appStatus, "Please select a file first", "error");
                return;
            }

            try {
                setStatus(appStatus, "Uploading and encrypting...", "success");
                const contentBase64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(String(reader.result).split(",")[1]);
                    reader.onerror = () => reject(new Error("Failed to read the file"));
                    reader.readAsDataURL(file);
                });

                const state = await api("/api/upload", {
                    method: "POST",
                    body: JSON.stringify({ filename: file.name, contentBase64 })
                });

                input.value = "";
                renderState(state);
                setStatus(appStatus, `Successfully uploaded ${file.name}`, "success");
                setTimeout(() => setStatus(appStatus, ""), 3000);
            } catch (error) {
                setStatus(appStatus, error.message, "error");
            }
        });

        document.getElementById("updateAdminBtn").addEventListener("click", async () => {
            const username = document.getElementById("newAdminUser").value.trim();
            const password = document.getElementById("newAdminPass").value.trim();
            if (!username || !password) {
                setStatus(appStatus, "Username and password are required", "error");
                return;
            }

            try {
                setStatus(appStatus, "Updating credentials...", "success");
                const state = await api("/api/admin/update", {
                    method: "POST",
                    body: JSON.stringify({ username, password })
                });
                renderState(state);
                document.getElementById("newAdminUser").value = "";
                document.getElementById("newAdminPass").value = "";
                setStatus(appStatus, "Admin credentials updated successfully", "success");
                setTimeout(() => setStatus(appStatus, ""), 3000);
            } catch (error) {
                setStatus(appStatus, error.message, "error");
            }
        });

        document.getElementById("prompt").addEventListener("keydown", event => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                document.getElementById("sendBtn").click();
            }
        });

        refresh().catch(error => setStatus(authStatus, error.message, "error"));
    </script>
</body>
</html>
