<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat</title>
    <style>
        :root {
            --bg: #f5efe3;
            --paper: #fffaf0;
            --ink: #1f2a1f;
            --muted: #647067;
            --line: #d9d1be;
            --accent: #1f6f5f;
            --accent-strong: #174f44;
            --warn: #a33b20;
            --shadow: 0 18px 40px rgba(41, 44, 31, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(31, 111, 95, 0.18), transparent 28%),
                linear-gradient(135deg, #efe5d1, #f8f4ea 52%, #e8efe8);
        }

        .shell {
            width: min(1200px, calc(100% - 32px));
            margin: 24px auto;
            display: grid;
            gap: 18px;
        }

        .card {
            background: rgba(255, 250, 240, 0.9);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        #auth {
            max-width: 420px;
            margin: 8vh auto 0;
            padding: 28px;
        }

        h1, h2, h3 {
            margin: 0 0 10px;
            font-weight: 600;
        }

        p {
            margin: 0;
            color: var(--muted);
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        input, textarea, button {
            font: inherit;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            color: var(--ink);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 12px 18px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            background: var(--accent-strong);
        }

        button.secondary {
            background: #d9e7df;
            color: var(--ink);
        }

        button.secondary:hover {
            background: #c8ddd3;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        #app {
            display: none;
            grid-template-columns: 300px 1fr;
            gap: 18px;
        }

        .panel {
            padding: 18px;
        }

        .sidebar {
            display: grid;
            gap: 18px;
            align-content: start;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 8px;
        }

        .list li {
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(217, 209, 190, 0.9);
            word-break: break-word;
        }

        .chat-layout {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 78vh;
        }

        #messages {
            overflow: auto;
            padding: 0 18px 18px;
            display: grid;
            gap: 12px;
        }

        .msg {
            padding: 14px 16px;
            border-radius: 18px;
            max-width: min(820px, 100%);
            white-space: pre-wrap;
            line-height: 1.45;
        }

        .msg.user {
            background: #1f6f5f;
            color: white;
            margin-left: auto;
        }

        .msg.assistant {
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid var(--line);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 18px;
            border-bottom: 1px solid var(--line);
            align-items: center;
        }

        .toolbar .meta {
            display: grid;
            gap: 4px;
        }

        .composer {
            padding: 18px;
            border-top: 1px solid var(--line);
            display: grid;
            gap: 12px;
        }

        .status {
            min-height: 24px;
            color: var(--muted);
        }

        .status.error {
            color: var(--warn);
        }

        #adminWrap {
            display: none;
        }

        @media (max-width: 900px) {
            #app {
                grid-template-columns: 1fr;
            }

            .chat-layout {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <section id="auth" class="card">
        <div class="stack">
            <div>
                <h1>Local AI Chat</h1>
                <p>Runs only on localhost. Browser UI, Java backend, PostgreSQL, Ollama.</p>
            </div>
            <input id="username" placeholder="Username">
            <input id="password" type="password" placeholder="Password">
            <div class="row">
                <button id="loginBtn">Login</button>
                <button id="signupBtn" class="secondary">Sign Up</button>
            </div>
            <div id="authStatus" class="status"></div>
        </div>
    </section>

    <section id="app">
        <aside class="sidebar">
            <div class="card panel stack">
                <div>
                    <h2>Documents</h2>
                    <p>PDF and TXT only. Content is encrypted before it hits PostgreSQL.</p>
                </div>
                <input id="fileInput" type="file" accept=".pdf,.txt">
                <button id="uploadBtn">Upload</button>
                <ul id="documents" class="list"></ul>
            </div>

            <div id="adminWrap" class="card panel stack">
                <div>
                    <h2>Admin View</h2>
                    <p>File names only across all users.</p>
                </div>
                <ul id="adminDocuments" class="list"></ul>
            </div>
        </aside>

        <main class="card chat-layout">
            <div class="toolbar">
                <div class="meta">
                    <strong id="who"></strong>
                    <p id="role"></p>
                </div>
                <button id="logoutBtn" class="secondary">Logout</button>
            </div>

            <div id="messages"></div>

            <div class="composer">
                <textarea id="prompt" rows="4" placeholder="Ask something. Mention a document name to include it in the prompt."></textarea>
                <div class="row">
                    <button id="sendBtn">Send</button>
                </div>
                <div id="appStatus" class="status"></div>
            </div>
        </main>
    </section>
</div>

<script>
    const auth = document.getElementById("auth");
    const app = document.getElementById("app");
    const authStatus = document.getElementById("authStatus");
    const appStatus = document.getElementById("appStatus");
    const messages = document.getElementById("messages");
    const documents = document.getElementById("documents");
    const adminWrap = document.getElementById("adminWrap");
    const adminDocuments = document.getElementById("adminDocuments");
    const who = document.getElementById("who");
    const role = document.getElementById("role");

    const api = async (path, options = {}) => {
        const response = await fetch(path, {
            credentials: "same-origin",
            headers: { "Content-Type": "application/json", ...(options.headers || {}) },
            ...options
        });
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || "Request failed");
        }
        return data;
    };

    const setStatus = (node, text, isError = false) => {
        node.textContent = text || "";
        node.className = isError ? "status error" : "status";
    };

    const renderList = (node, rows) => {
        node.innerHTML = "";
        if (!rows.length) {
            const li = document.createElement("li");
            li.textContent = "Nothing here yet.";
            node.appendChild(li);
            return;
        }
        rows.forEach(text => {
            const li = document.createElement("li");
            li.textContent = text;
            node.appendChild(li);
        });
    };

    const renderMessages = rows => {
        messages.innerHTML = "";
        rows.forEach(row => {
            const div = document.createElement("div");
            div.className = `msg ${row.role === "assistant" ? "assistant" : "user"}`;
            div.textContent = row.message;
            messages.appendChild(div);
        });
        messages.scrollTop = messages.scrollHeight;
    };

    const renderState = state => {
        if (!state.authenticated) {
            auth.style.display = "block";
            app.style.display = "none";
            return;
        }

        auth.style.display = "none";
        app.style.display = "grid";
        who.textContent = state.username;
        role.textContent = state.role;
        renderMessages(state.messages || []);
        renderList(documents, (state.documents || []).map(doc => doc.filename));
        adminWrap.style.display = state.role === "admin" ? "block" : "none";
        renderList(adminDocuments, state.adminDocuments || []);
    };

    const refresh = async () => {
        const state = await api("/api/state", { method: "GET" });
        renderState(state);
    };

    const authAction = async path => {
        try {
            setStatus(authStatus, "");
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const state = await api(path, {
                method: "POST",
                body: JSON.stringify({ username, password })
            });
            renderState(state);
        } catch (error) {
            setStatus(authStatus, error.message, true);
        }
    };

    document.getElementById("loginBtn").addEventListener("click", () => authAction("/api/login"));
    document.getElementById("signupBtn").addEventListener("click", () => authAction("/api/signup"));

    document.getElementById("logoutBtn").addEventListener("click", async () => {
        await api("/api/logout", { method: "POST", body: "{}" });
        setStatus(appStatus, "");
        renderState({ authenticated: false });
    });

    document.getElementById("sendBtn").addEventListener("click", async () => {
        const prompt = document.getElementById("prompt");
        const message = prompt.value.trim();
        if (!message) {
            return;
        }

        try {
            setStatus(appStatus, "Waiting for Ollama...");
            const state = await api("/api/chat", {
                method: "POST",
                body: JSON.stringify({ message })
            });
            prompt.value = "";
            renderState(state);
            setStatus(appStatus, "Response received.");
        } catch (error) {
            setStatus(appStatus, error.message, true);
        }
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
        const input = document.getElementById("fileInput");
        const file = input.files[0];
        if (!file) {
            setStatus(appStatus, "Choose a PDF or TXT file first.", true);
            return;
        }

        try {
            setStatus(appStatus, "Uploading...");
            const contentBase64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result).split(",")[1]);
                reader.onerror = () => reject(new Error("Failed to read the file."));
                reader.readAsDataURL(file);
            });

            const state = await api("/api/upload", {
                method: "POST",
                body: JSON.stringify({ filename: file.name, contentBase64 })
            });

            input.value = "";
            renderState(state);
            setStatus(appStatus, `Uploaded ${file.name}.`);
        } catch (error) {
            setStatus(appStatus, error.message, true);
        }
    });

    document.getElementById("prompt").addEventListener("keydown", event => {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            document.getElementById("sendBtn").click();
        }
    });

    refresh().catch(error => setStatus(authStatus, error.message, true));
</script>
</body>
</html>
